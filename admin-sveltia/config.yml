backend:
  name: github
  repo: Eltap/ember-and-oak
  branch: master

# Lets you try this admin panel locally (via `npx decap-server`) with no
# GitHub login at all. Remove this line before going live with a real
# client, once GitHub OAuth is wired up.
local_backend: true

media_folder: "images"
public_folder: "images"

collections:
  - name: "products"
    label: "Products"
    files:
      - file: "products.json"
        label: "Product Catalog"
        name: "catalog"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.name}} — ${{fields.price}}"
            fields:
              - label: "ID"
                name: "id"
                widget: "string"
                hint: "Unique, lowercase, hyphens only (e.g. pumpkin-spice)"
              - label: "Name"
                name: "name"
                widget: "string"
              - label: "Scent"
                name: "scent"
                widget: "string"
              - label: "Price"
                name: "price"
                widget: "number"
                value_type: "float"
              - label: "Description"
                name: "desc"
                widget: "text"
              - label: "Image"
                name: "image"
                widget: "string"
                hint: "Path to the product image, e.g. images/candle-amber-oakwood.svg"
